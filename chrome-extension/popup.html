<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 280px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #0a0a16, #0f0f23);
      color: #e2e8f0;
    }

    /* ── Header ────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(168,85,247,0.25));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Status pill ───────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: rgba(255,255,255,0.02);
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      position: relative;
    }
    .status-dot.active { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.6); }
    .status-dot.paused { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.4); }
    .status-dot.active::after {
      content: ''; position: absolute; inset: -3px;
      border-radius: 50%; border: 1.5px solid rgba(52,211,153,0.3);
      animation: ping 1.5s ease-out infinite;
    }
    @keyframes ping {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.8); }
    }

    /* ── Info cards ────────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 18px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(10px);
    }
    .card .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .card .value {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Current tab ───────────────────────────────────── */
    .current-tab {
      margin: 0 18px 14px;
      padding: 12px 14px;
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 12px;
    }
    .current-tab .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(129,140,248,0.6);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .current-tab .title {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .current-tab .url {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Buttons ───────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 8px;
      padding: 0 18px 16px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-family: inherit;
    }
    .btn-toggle {
      background: rgba(99,102,241,0.12);
      color: #818cf8;
    }
    .btn-toggle:hover { background: rgba(99,102,241,0.25); }
    .btn-toggle.paused {
      background: rgba(52,211,153,0.12);
      color: #34d399;
      border-color: rgba(52,211,153,0.2);
    }
    .btn-flush {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
    }
    .btn-flush:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
    }

    /* ── Footer ────────────────────────────────────────── */
    .footer {
      padding: 10px 18px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      font-family: 'Fira Code', monospace;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">📊</div>
    <h1>Activity Monitor</h1>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-pill">
      <div class="status-dot active" id="statusDot"></div>
      <span id="statusText">TRACKING</span>
    </div>
    <span id="lastFlush" style="font-size:10px;color:rgba(255,255,255,0.25);font-family:monospace;"></span>
  </div>

  <!-- Stat cards -->
  <div class="cards">
    <div class="card">
      <div class="label">Sessions Sent</div>
      <div class="value" id="totalSent">0</div>
    </div>
    <div class="card">
      <div class="label">Pending</div>
      <div class="value" id="pendingCount">0</div>
    </div>
  </div>

  <!-- Current tab -->
  <div class="current-tab" id="currentTabCard">
    <div class="label">Currently Tracking</div>
    <div class="title" id="currentTitle">—</div>
    <div class="url" id="currentUrl">—</div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-toggle" id="toggleBtn">⏸ Pause</button>
    <button class="btn btn-flush" id="flushBtn">⬆ Send Now</button>
  </div>

  <!-- Footer -->
  <div class="footer" id="footer">
    Syncing to activity-monitor-qmx3.onrender.com
  </div>

  <script src="popup.js"></script>
</body>
</html>
